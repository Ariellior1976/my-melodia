<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Melodia AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8f9fa; }
        .station { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="p-8 text-center">
        <h1 class="text-3xl font-light tracking-widest uppercase">Melodia <span class="font-bold">AI</span></h1>
    </nav>

    <main class="max-w-2xl mx-auto mt-12 p-10 bg-white shadow-lg rounded-xl border border-slate-100">
        
        <section id="step1" class="station active text-center">
            <h2 class="text-4xl mb-8 font-light">הופכים מילים למוזיקה.</h2>
            <button onclick="nextStep(2)" class="border-2 border-slate-900 px-12 py-3 hover:bg-slate-900 hover:text-white transition-all">בואו נתחיל</button>
        </section>

        <section id="step2" class="station">
            <h2 class="text-2xl mb-6 font-bold">הכנס מילים לשיר:</h2>
            <textarea id="userLyrics" class="w-full h-40 p-4 border rounded bg-slate-50" placeholder="כתוב כאן..."></textarea>
            <div class="mt-6 flex justify-between">
                <button onclick="nextStep(1)" class="text-slate-400">חזרה</button>
                <button onclick="generateSong()" class="bg-slate-900 text-white px-10 py-2 rounded">צור שיר</button>
            </div>
            <div id="status" class="mt-4 text-center text-indigo-600 font-bold"></div>
            <audio id="audioPlayer" controls class="mt-6 w-full hidden"></audio>
        </section>

    </main>
<script>
    // וודא שהטוקן מודבק כאן בדיוק, בלי רווחים לפני או אחרי
    const MY_TOKEN = "hf_HgMalPYAhriccdUSMCeEwHFukkPxNqXus"; 

    function nextStep(num) {
        document.querySelectorAll('.station').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
    }

    async function generateSong() {
        const lyrics = document.getElementById('userLyrics').value;
        const status = document.getElementById('status');
        const player = document.getElementById('audioPlayer');

        if(!lyrics) return alert("נא להזין מילים");

        status.innerText = "מתחבר לשרת ה-AI... נא להמתין";
        player.classList.add('hidden');

        try {
            // החלפתי למודל MMS של פייסבוק - הוא הרבה יותר יציב ב-API
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/mms-tts-heb",
                {
                    headers: { 
                        "Authorization": "Bearer " + MY_TOKEN,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: lyrics }),
                }
            );

            if (!response.ok) {
                const errorData = await response.json();
                console.log(errorData);
                if (errorData.error && errorData.error.includes("currently loading")) {
                    status.innerText = "השרת מתעורר... נסה שוב בעוד 20 שניות";
                } else {
                    status.innerText = "שגיאה: השרת עמוס. נסה שוב בעוד רגע.";
                }
                return;
            }

            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            player.src = audioUrl;
            player.classList.remove('hidden');
            status.innerText = "השיר מוכן! לחץ על Play";

        } catch (err) {
            status.innerText = "שגיאה טכנית. וודא שיש אינטרנט והטוקן תקין.";
            console.error(err);
        }
    }
</script>
