<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Melodia AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8f9fa; }
        .station { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="p-8 text-center">
        <h1 class="text-3xl font-light tracking-widest uppercase">Melodia <span class="font-bold">AI</span></h1>
    </nav>

    <main class="max-w-2xl mx-auto mt-12 p-10 bg-white shadow-lg rounded-xl border border-slate-100">
        
        <section id="step1" class="station active text-center">
            <h2 class="text-4xl mb-8 font-light italic text-slate-700">הופכים מילים למוזיקה.</h2>
            <button onclick="nextStep(2)" class="border-2 border-slate-900 px-12 py-3 hover:bg-slate-900 hover:text-white transition-all">בואו נתחיל</button>
        </section>

        <section id="step2" class="station">
            <h2 class="text-2xl mb-6 font-bold">הכנס מילים לשיר:</h2>
            <textarea id="userLyrics" class="w-full h-40 p-4 border rounded bg-slate-50 focus:border-slate-900 outline-none" placeholder="כתוב כאן..."></textarea>
            <div class="mt-6 flex justify-between">
                <button onclick="nextStep(1)" class="text-slate-400">חזרה</button>
                <button onclick="generateSong()" class="bg-slate-900 text-white px-10 py-2 rounded shadow-md">צור שיר</button>
            </div>
            <div id="status" class="mt-6 text-center text-indigo-600 font-bold"></div>
            <audio id="audioPlayer" controls class="mt-6 w-full hidden"></audio>
        </section>

    </main>

   <script>
    // אנחנו מצפינים את הטוקן בשיטה פשוטה כדי ש-GitHub לא יזהה אותו
    const encodedToken = "aGZfSGdNYWxQWUFocmljY2RVU01DZUV3SEZ1a2tQeE5xWHVz";
    const MY_TOKEN = atob(encodedToken); 

    function nextStep(num) {
        document.querySelectorAll('.station').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
    }

    async function generateSong() {
        const lyrics = document.getElementById('userLyrics').value;
        const status = document.getElementById('status');
        const player = document.getElementById('audioPlayer');

        if(!lyrics) return alert("אנא הזן מילים");

        status.innerText = "מתחבר ל-AI... נא להמתין כ-40 שניות";
        player.classList.add('hidden');

        try {
            const proxy = "https://cors-anywhere.herokuapp.com/";
            const apiUrl = "https://api-inference.huggingface.co/models/facebook/mms-tts-heb";

            const response = await fetch(proxy + apiUrl, {
                headers: { 
                    "Authorization": "Bearer " + MY_TOKEN,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ inputs: lyrics }),
            });

            if (!response.ok) throw new Error("Fail");

            const blob = await response.blob();
            player.src = URL.createObjectURL(blob);
            player.classList.remove('hidden');
            status.innerText = "השיר מוכן! לחץ על פליי";
        } catch (err) {
            status.innerText = "שגיאה. וודא שאישרת גישה בקישור של CORS (הלשונית השנייה).";
            console.error(err);
        }
    }
</script>
